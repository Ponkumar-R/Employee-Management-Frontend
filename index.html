<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Registration System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/256/1141/1141822.png">
  <style>
    body {
      font-family: 'DM Serif Text', serif;
      background-color: #fff8ee;
      text-align: center;
      padding: 100px 20px;
      background-image: url("blood-moon-mountains-scenery-4k-wallpaper-uhdpaper.com-225@0@k.jpg");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 50px;
      color: #333;
    }
    a button {
      background-color: #28a745;
      color: white;
      padding: 15px 30px;
      margin: 10px;
      border: none;
      font-size: 16px;
      border-radius: 10px;
      transition: background 0.3s ease;
      cursor: pointer;
      opacity: 0; 
    }

    a button:hover {
      background-color: #218838;
    }
    #btn1 {
      animation-name: b1;
      animation-duration: 0.5s;
      animation-delay: 0s;
      animation-fill-mode: forwards;
      animation-timing-function: ease-out;
      animation-iteration-count: 1;
    }
    #btn2 {
      animation-name: b2;
      animation-duration: 0.5s;
      animation-delay: 1s;
      animation-fill-mode: forwards;
      animation-timing-function: ease-out;
      animation-iteration-count: 1;
    }
    #btn3 {
      animation-name: b3;
      animation-duration: 0.5s;
      animation-delay: 0.5s;
      animation-fill-mode: forwards;
      animation-timing-function: ease-out;
      animation-iteration-count: 1;
    }
    @keyframes b1 {
      from {
        transform: translateX(-250%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    @keyframes b2 {
      from {
        transform: translateY(500%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    @keyframes b3 {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <h1>IT Course Registration System</h1>
  <a href="register.html"><button id="btn1"><i class="fas fa-user-plus"></i> Register Student</button></a>
  <a href="availableCourse.html"><button id="btn2"><i class="fas fa-book"></i> View Courses</button></a>
  <a href="enrolled.html"><button id="btn3"><i class="fas fa-users"></i> Enrolled Students</button></a>
</body>
</html>
